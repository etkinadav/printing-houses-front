<div class="home-page">
  <div class="home-map-screen">
    <div #mapEl class="home-map"></div>
  </div>

  <div class="home-map-markers-pool" aria-hidden="true">
    <div
      *ngFor="let ph of mapPrintingHouses"
      #markerEl
      class="home-map-marker"
      [class.home-map-marker--dark]="isDarkMode"
      hidden
    >
      <div class="home-map-marker-card">
        <app-ph-logo-crop
          *ngIf="phLogoUrl(ph)"
          [imageUrl]="phLogoUrl(ph)"
          [logo]="ph.logo"
          size="1.75rem"
        />
        <span class="home-map-marker-name">{{ ph.name }}</span>
      </div>
      <div class="home-map-marker-pin"></div>
    </div>
  </div>

  <nav
    *ngIf="categoryGroups.length"
    class="home-catalog-nav"
    [class.home-catalog-nav-dark]="isDarkMode"
    [attr.dir]="isRTL ? 'rtl' : 'ltr'"
    (click)="$event.stopPropagation()"
    (mouseleave)="onNavMouseLeave()"
  >
    <div class="home-catalog-nav-bar">
      <div class="home-catalog-buttons">
        <div
          *ngFor="let category of categoryGroups; let categoryIndex = index"
          class="home-catalog-category"
          (mouseenter)="onCategoryMouseEnter(categoryIndex)"
        >
          <button
            type="button"
            class="home-catalog-category-btn"
            [class.active]="activeCategoryIndex === categoryIndex"
            (click)="onCategoryClick(categoryIndex, $event)"
          >
            {{ category.name }}
          </button>
        </div>
      </div>

      <div
        *ngIf="activeCategoryIndex !== null && categoryGroups[activeCategoryIndex] as activeCategory"
        class="home-catalog-panel"
        [attr.dir]="isRTL ? 'rtl' : 'ltr'"
        (mouseenter)="onPanelMouseEnter()"
        (mouseleave)="onPanelMouseLeave()"
      >
        <div
          *ngFor="let subCategory of activeCategory.subCategories"
          class="home-catalog-subsection"
        >
          <h3 class="home-catalog-subtitle">{{ subCategory.name }}</h3>
          <ul class="home-catalog-products">
            <li
              *ngFor="let product of subCategory.products"
              class="home-catalog-product"
            >
              <span class="home-catalog-product-name">{{ getProductDisplayName(product) }}</span>
              <div
                *ngIf="hasPrintingHouseInfo(product)"
                class="home-catalog-product-ph"
              >
                <app-ph-logo-crop
                  *ngIf="getPrintingHouseLogoUrl(product)"
                  [imageUrl]="getPrintingHouseLogoUrl(product)"
                  [logo]="getPrintingHouseLogo(product)"
                  size="2.125rem"
                />
                <div
                  *ngIf="getPrintingHouseName(product) || getPrintingHouseCity(product)"
                  class="home-catalog-product-ph-text"
                >
                  <span
                    *ngIf="getPrintingHouseName(product)"
                    class="home-catalog-product-ph-name"
                  >{{ getPrintingHouseName(product) }}</span>
                  <span
                    *ngIf="getPrintingHouseCity(product)"
                    class="home-catalog-product-ph-city"
                  >{{ getPrintingHouseCity(product) }}</span>
                </div>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
</div>
