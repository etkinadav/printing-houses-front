<div
  #measureHost
  class="ph-print-preview-host w-100 h-100 d-flex justify-content-center align-items-center">

  <div
    *ngIf="layout && imageUrl"
    class="ph-print-preview-bundle"
    [class.ph-print-preview-bundle--not-rtl]="!isRTL">
    <div
      class="ph-print-preview-stage position-relative"
      [class.bg-white]="!layout.hasBleed && !layout.hasCornerShape"
      [class.shadow-85-strong]="!layout.hasBleed && !layout.hasCornerShape"
      [class.ph-print-preview-stage--bleed]="layout.hasBleed"
      [style.width.px]="layout.sheetWidthPx"
      [style.height.px]="layout.sheetHeightPx">

    <!-- Top dimension lines (outside sheet, mean-corse dimm-container-up) -->

    <article class="ph-print-preview-dim-top">

      <div

        *ngFor="let seg of layout.topDimSegments; trackBy: trackDimSegment"

        class="ph-print-preview-dim-top-segment h-100 d-flex flex-column"

        [style.width.px]="seg.sizePx">

        <div class="w-100 d-flex flex-column align-items-center">

          <div class="position-relative">

            <div

              class="ph-print-preview-dim-label ph-print-preview-dim-label--top"

              [class.ph-print-preview-dim-label--top-not-rtl]="!isRTL">

              <span class="zx-text-tiny">{{ seg.labelCm }}</span>

              <span class="zx-text-tiny-tiny">{{ 'printing-table.dimensions-cm' | translate }}</span>

            </div>

          </div>

        </div>

        <div class="ph-print-preview-dim-top-inner">

          <div class="ph-print-preview-dim-up-lines">

            <div class="ph-print-preview-dim-up-line"></div>

          </div>

        </div>

      </div>

    </article>



    <!-- Side dimension lines (outside sheet, mean-corse dimm-container-side-express) -->

    <article class="ph-print-preview-dim-side">

      <div

        *ngFor="let seg of layout.sideDimSegments; trackBy: trackDimSegment"

        class="ph-print-preview-dim-side-segment d-flex flex-row-reverse"

        [style.height.px]="seg.sizePx">

        <div class="h-100 d-flex align-items-center">

          <div class="position-relative">

            <div class="ph-print-preview-dim-label ph-print-preview-dim-label--side">

              <span class="zx-text-tiny">{{ seg.labelCm }}</span>

              <span class="zx-text-tiny-tiny">{{ 'printing-table.dimensions-cm' | translate }}</span>

            </div>

          </div>

        </div>

        <div class="ph-print-preview-dim-side-inner">

          <div class="ph-print-preview-dim-side-lines">

            <div class="ph-print-preview-dim-side-line"></div>

          </div>

        </div>

      </div>

    </article>



    <!-- Print sheet -->

    <div
      class="ph-print-preview-sheet w-100 h-100"
      [class.ph-print-preview-sheet--bleed]="layout.hasBleed"
      [class.ph-print-preview-sheet--corner-shape]="layout.hasCornerShape"
      [style.grid-template-columns]="
        layout.hasBleed
          ? layout.bleedPx + 'px ' + layout.baseWidthPx + 'px ' + layout.bleedPx + 'px'
          : layout.baseWidthPx + 'px'
      "
      [style.grid-template-rows]="
        layout.hasBleed
          ? layout.bleedPx + 'px ' + layout.baseHeightPx + 'px ' + layout.bleedPx + 'px'
          : layout.baseHeightPx + 'px'
      "
      [style.clip-path]="layout.sheetClipPath"
      [style.border-radius.px]="layout.sheetBorderRadiusPx">

      <!-- Image: base only, or cross-shaped bleed area (corners excluded) -->

      <div
        class="ph-print-preview-image-layer"
        [class.ph-print-preview-image-layer--bleed]="layout.hasBleed"
        [style.grid-area]="layout.hasBleed ? '1 / 1 / 4 / 4' : '1 / 1 / 2 / 2'"
        [style.clip-path]="layout.imageClipPath"
        [style.border-radius.px]="layout.imageBorderRadiusPx">
        <img [src]="imageUrl!" class="ph-print-preview-image" alt="" />
      </div>



      <!-- Bleed: corner squares stay paper-only (no image between arms) -->

      <ng-container *ngIf="layout.hasBleed">
        <div
          *ngIf="!layout.hasCornerShape"
          class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--tl"></div>
        <div
          *ngIf="!layout.hasCornerShape"
          class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--tr"></div>
        <div
          *ngIf="!layout.hasCornerShape"
          class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--bl"></div>
        <div
          *ngIf="!layout.hasCornerShape"
          class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--br"></div>

        <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--top"></div>
        <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--bottom"></div>
        <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--left"></div>
        <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--right"></div>

        <svg
          *ngIf="layout.bleedOutlinePolygonPoints"
          class="ph-print-preview-bleed-outline"
          [attr.viewBox]="'0 0 ' + layout.sheetWidthPx + ' ' + layout.sheetHeightPx"
          preserveAspectRatio="none">
          <polygon
            [attr.points]="layout.bleedOutlinePolygonPoints"
            fill="none"
            stroke="var(--zx-green)"
            stroke-width="2"
            vector-effect="non-scaling-stroke" />
        </svg>

        <svg
          *ngIf="layout.hasCornerShape && (layout.sheetOutlinePolygonPoints || layout.sheetOutlinePath)"
          class="ph-print-preview-sheet-outline"
          [attr.viewBox]="'0 0 ' + layout.sheetWidthPx + ' ' + layout.sheetHeightPx"
          preserveAspectRatio="none">
          <polygon
            *ngIf="layout.sheetOutlinePolygonPoints"
            [attr.points]="layout.sheetOutlinePolygonPoints"
            fill="none"
            stroke="var(--zx-green)"
            stroke-width="2"
            vector-effect="non-scaling-stroke" />
          <path
            *ngIf="layout.sheetOutlinePath"
            [attr.d]="layout.sheetOutlinePath"
            fill="none"
            stroke="var(--zx-green)"
            stroke-width="2"
            vector-effect="non-scaling-stroke" />
        </svg>
      </ng-container>



      <!-- Base frame (green border) -->
      <div
        class="ph-print-preview-base-frame"
        [class.ph-print-preview-base-frame--rounded]="cornerType === 'rounded'"
        [class.ph-print-preview-base-frame--chamfer]="cornerType === 'chamfer'"
        [class.ph-print-preview-base-frame--outline-hidden]="layout.hasBleed && layout.hasCornerShape"
        [style.grid-area]="layout.hasBleed ? '2 / 2 / 3 / 3' : '1 / 1 / 2 / 2'"
        [style.border-radius.px]="cornerType === 'rounded' ? layout.cornerRadiusPx : 0">
        <svg
          *ngIf="cornerType === 'chamfer' && layout.chamferOutlinePolygonPoints && !(layout.hasBleed && layout.hasCornerShape)"
          class="ph-print-preview-base-frame-outline"
          [attr.viewBox]="'0 0 ' + layout.baseWidthPx + ' ' + layout.baseHeightPx"
          preserveAspectRatio="none">
          <polygon
            [attr.points]="layout.chamferOutlinePolygonPoints"
            fill="none"
            stroke="var(--zx-green)"
            stroke-width="2"
            vector-effect="non-scaling-stroke" />
        </svg>
      </div>

    </div>
    </div>
  </div>
</div>
