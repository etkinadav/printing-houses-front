<div
  #measureHost
  class="ph-print-preview-host w-100 h-100 d-flex justify-content-center align-items-center"
  [class.ph-print-preview-host--duplex]="isDuplexStack && !compactSheetOnly"
  [class.ph-print-preview-host--compact]="compactSheetOnly"
  [class.ph-print-preview-host--canvas]="canvasMode">

  <ng-container *ngIf="!canvasMode">
    <img
      *ngFor="let url of activeImageUrls; trackBy: trackImageUrl"
      #preloadImage
      class="ph-print-preview-preload"
      [class.ph-print-preview-preload--hidden]="compactSheetOnly"
      [src]="url"
      alt=""
      (load)="onPreviewImageLoaded(url)"
      (error)="onPreviewImageLoaded(url)" />
  </ng-container>

  <div
    *ngIf="imageLoading && !compactSheetOnly"
    class="ph-print-preview-page-loading"
    aria-busy="true"
    aria-live="polite">
    <mat-spinner
      class="ph-print-preview-page-loading__spinner"
      [diameter]="24"></mat-spinner>
  </div>

  <div
    *ngIf="shouldShowPreviewBundle"
    class="ph-print-preview-single-pane w-100"
    [class.ph-print-preview-single-pane--canvas]="canvasMode && !compactSheetOnly"
    [class.ph-print-preview-single-pane--duplex]="isDuplexStack && !compactSheetOnly">
    <ng-container
      *ngTemplateOutlet="
        previewBundle;
        context: {
          sheetImageUrl: visibleSheetImageUrl,
          isDuplexFront: visibleIsDuplexFront,
          side: visiblePreviewSide
        }
      ">
    </ng-container>
  </div>
</div>

<ng-template #previewBundle let-sheetImageUrl="sheetImageUrl" let-isDuplexFront="isDuplexFront" let-side="side">
  <div
    class="ph-print-preview-bundle"
    [class.ph-print-preview-bundle--not-rtl]="!isRTL"
    [class.ph-print-preview-bundle--fold-dims]="layout.hasFoldDims">
    <div
      class="ph-print-preview-stage position-relative"
      [class.ph-print-preview-stage--canvas]="canvasMode"
      [class.bg-white]="!canvasMode && !layout.hasBleed && !layout.hasCornerShape"
      [class.shadow-85-strong]="!canvasMode && !layout.hasBleed && !layout.hasCornerShape"
      [class.ph-print-preview-stage--bleed]="layout.hasBleed"
      [style.width.px]="layout.sheetWidthPx"
      [style.height.px]="layout.sheetHeightPx">

      <article class="ph-print-preview-dim-top">
        <div
          *ngFor="let seg of layout.topDimSegments; trackBy: trackDimSegment"
          class="ph-print-preview-dim-top-segment h-100 d-flex flex-column"
          [style.width.px]="seg.sizePx">
          <div class="w-100 d-flex flex-column align-items-center">
            <div class="position-relative">
              <div
                class="ph-print-preview-dim-label ph-print-preview-dim-label--top"
                [class.ph-print-preview-dim-label--top-not-rtl]="!isRTL">
                <span class="zx-text-tiny">{{ seg.labelCm }}</span>
                <span class="zx-text-tiny-tiny">{{ 'printing-table.dimensions-cm' | translate }}</span>
              </div>
            </div>
          </div>
          <div class="ph-print-preview-dim-top-inner">
            <div class="ph-print-preview-dim-up-lines">
              <div class="ph-print-preview-dim-up-line"></div>
            </div>
          </div>
        </div>
      </article>

      <article
        *ngIf="layout.hasFoldDims"
        class="ph-print-preview-dim-top-fold"
        [style.left.px]="layout.hasBleed ? layout.bleedPx : 0"
        [style.width.px]="layout.baseWidthPx">
        <div
          *ngFor="let seg of layout.baseFoldDimSegments; trackBy: trackDimSegment"
          class="ph-print-preview-dim-top-fold-segment h-100 d-flex flex-column"
          [style.width.px]="seg.sizePx">
          <div class="w-100 d-flex flex-column align-items-center">
            <div class="position-relative">
              <div
                class="ph-print-preview-dim-label ph-print-preview-dim-label--top-fold"
                [class.ph-print-preview-dim-label--top-not-rtl]="!isRTL">
                <span class="zx-text-tiny-tiny">{{ seg.labelCm }}</span>
                <span class="zx-text-tiny-tiny">{{ 'printing-table.dimensions-cm' | translate }}</span>
              </div>
            </div>
          </div>
          <div class="ph-print-preview-dim-top-fold-inner">
            <div class="ph-print-preview-dim-up-lines">
              <div class="ph-print-preview-dim-up-line"></div>
            </div>
          </div>
        </div>
      </article>

      <article class="ph-print-preview-dim-side">
        <div
          *ngFor="let seg of layout.sideDimSegments; trackBy: trackDimSegment"
          class="ph-print-preview-dim-side-segment d-flex flex-row-reverse"
          [style.height.px]="seg.sizePx">
          <div class="h-100 d-flex align-items-center">
            <div class="position-relative">
              <div class="ph-print-preview-dim-label ph-print-preview-dim-label--side">
                <span class="zx-text-tiny">{{ seg.labelCm }}</span>
                <span class="zx-text-tiny-tiny">{{ 'printing-table.dimensions-cm' | translate }}</span>
              </div>
            </div>
          </div>
          <div class="ph-print-preview-dim-side-inner">
            <div class="ph-print-preview-dim-side-lines">
              <div class="ph-print-preview-dim-side-line"></div>
            </div>
          </div>
        </div>
      </article>

      <div
      class="ph-print-preview-sheet w-100 h-100"
      [class.ph-print-preview-sheet--canvas]="canvasMode"
      [class.ph-print-preview-sheet--bleed]="layout.hasBleed"
      [class.ph-print-preview-sheet--corner-shape]="layout.hasCornerShape"
      [class.ph-print-preview-sheet--duplex-front]="isDuplexFront"
        [style.grid-template-columns]="
          layout.hasBleed
            ? layout.bleedPx + 'px ' + layout.baseWidthPx + 'px ' + layout.bleedPx + 'px'
            : layout.baseWidthPx + 'px'
        "
        [style.grid-template-rows]="
          layout.hasBleed
            ? layout.bleedPx + 'px ' + layout.baseHeightPx + 'px ' + layout.bleedPx + 'px'
            : layout.baseHeightPx + 'px'
        "
        [style.clip-path]="canvasMode ? null : layout.sheetClipPath"
        [style.border-radius.px]="canvasMode ? null : layout.sheetBorderRadiusPx">

        <ng-container
          *ngTemplateOutlet="previewSheetImage; context: { sheetImageUrl: sheetImageUrl, side: side }">
        </ng-container>

        <ng-container *ngIf="!compactSheetOnly">
          <ng-container *ngIf="layout.hasBleed">
            <div
              *ngIf="!layout.hasCornerShape"
              class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--tl"></div>
            <div
              *ngIf="!layout.hasCornerShape"
              class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--tr"></div>
            <div
              *ngIf="!layout.hasCornerShape"
              class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--bl"></div>
            <div
              *ngIf="!layout.hasCornerShape"
              class="ph-print-preview-bleed-corner ph-print-preview-bleed-corner--br"></div>

            <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--top"></div>
            <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--bottom"></div>
            <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--left"></div>
            <div class="ph-print-preview-bleed-strip ph-print-preview-bleed-strip--right"></div>

            <svg
              *ngIf="layout.bleedOutlinePolygonPoints"
              class="ph-print-preview-bleed-outline"
              [attr.viewBox]="'0 0 ' + layout.sheetWidthPx + ' ' + layout.sheetHeightPx"
              preserveAspectRatio="none">
              <polygon
                [attr.points]="layout.bleedOutlinePolygonPoints"
                fill="none"
                stroke="var(--zx-green)"
                stroke-width="1"
                vector-effect="non-scaling-stroke" />
            </svg>

            <svg
              *ngIf="layout.hasCornerShape && (layout.sheetOutlinePolygonPoints || layout.sheetOutlinePath)"
              class="ph-print-preview-sheet-outline"
              [attr.viewBox]="'0 0 ' + layout.sheetWidthPx + ' ' + layout.sheetHeightPx"
              preserveAspectRatio="none">
              <polygon
                *ngIf="layout.sheetOutlinePolygonPoints"
                [attr.points]="layout.sheetOutlinePolygonPoints"
                fill="none"
                stroke="var(--zx-green)"
                stroke-width="1"
                vector-effect="non-scaling-stroke" />
              <path
                *ngIf="layout.sheetOutlinePath"
                [attr.d]="layout.sheetOutlinePath"
                fill="none"
                stroke="var(--zx-green)"
                stroke-width="1"
                vector-effect="non-scaling-stroke" />
            </svg>
          </ng-container>

          <div
            class="ph-print-preview-base-frame"
            [class.ph-print-preview-base-frame--rounded]="cornerType === 'rounded'"
            [class.ph-print-preview-base-frame--chamfer]="cornerType === 'chamfer'"
            [class.ph-print-preview-base-frame--outline-hidden]="layout.hasBleed && layout.hasCornerShape"
            [style.grid-area]="layout.hasBleed ? '2 / 2 / 3 / 3' : '1 / 1 / 2 / 2'"
            [style.border-radius.px]="cornerType === 'rounded' ? layout.cornerRadiusPx : 0">
            <svg
              *ngIf="cornerType === 'chamfer' && layout.chamferOutlinePolygonPoints && !(layout.hasBleed && layout.hasCornerShape)"
              class="ph-print-preview-base-frame-outline"
              [attr.viewBox]="'0 0 ' + layout.baseWidthPx + ' ' + layout.baseHeightPx"
              preserveAspectRatio="none">
              <polygon
                [attr.points]="layout.chamferOutlinePolygonPoints"
                fill="none"
                stroke="var(--zx-green)"
                stroke-width="1"
                vector-effect="non-scaling-stroke" />
            </svg>

            <svg
              *ngIf="layout.foldingLines.length"
              class="ph-print-preview-folding-overlay"
              [attr.viewBox]="'0 0 ' + layout.baseWidthPx + ' ' + layout.baseHeightPx"
              preserveAspectRatio="none"
              aria-hidden="true">
              <line
                *ngFor="let line of layout.foldingLines; trackBy: trackFoldLine"
                [attr.x1]="line.leftPx"
                [attr.y1]="0"
                [attr.x2]="line.leftPx"
                [attr.y2]="layout.baseHeightPx"
                stroke="var(--zx-green)"
                stroke-width="1"
                stroke-dasharray="8 6"
                vector-effect="non-scaling-stroke" />
            </svg>

            <svg
              *ngIf="layout.hasTrimBleedGuide"
              class="ph-print-preview-trim-bleed-guide"
              [attr.viewBox]="'0 0 ' + layout.baseWidthPx + ' ' + layout.baseHeightPx"
              preserveAspectRatio="none"
              aria-hidden="true">
              <polygon
                *ngIf="layout.trimBleedGuidePolygonPoints"
                [attr.points]="layout.trimBleedGuidePolygonPoints"
                class="ph-print-preview-trim-bleed-guide__shape"
                fill="none"
                vector-effect="non-scaling-stroke" />
              <path
                *ngIf="layout.trimBleedGuidePath"
                [attr.d]="layout.trimBleedGuidePath"
                class="ph-print-preview-trim-bleed-guide__shape"
                fill="none"
                vector-effect="non-scaling-stroke" />
            </svg>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</ng-template>

<ng-template #previewSheetImage let-sheetImageUrl="sheetImageUrl" let-side="side">
  <div
    class="ph-print-preview-image-layer"
    [class.ph-print-preview-image-layer--bleed]="layout.hasBleed"
    [class.ph-print-preview-image-layer--compact]="compactSheetOnly"
    [class.ph-print-preview-image-layer--canvas]="canvasMode"
    [style.grid-area]="compactSheetOnly ? null : (layout.hasBleed ? '1 / 1 / 4 / 4' : '1 / 1 / 2 / 2')"
    [style.clip-path]="canvasMode ? null : layout.imageClipPath"
    [style.border-radius.px]="canvasMode ? null : layout.imageBorderRadiusPx">
    <div
      *ngIf="canvasMode && !compactSheetOnly"
      class="ph-print-preview-canvas-shadow"
      aria-hidden="true"
      [style.clip-path]="layout.imageClipPath"
      [style.border-radius.px]="canvasShadowBorderRadiusPx"></div>
    <div
      *ngIf="canvasMode"
      class="ph-print-preview-image-bg"
      [class.ph-print-preview-image-layer--bleed]="layout.hasBleed"
      [ngStyle]="sheetBackgroundStyles"
      [style.clip-path]="layout.imageClipPath"
      [style.border-radius.px]="layout.imageBorderRadiusPx"></div>
    <app-ph-canvas-sheet
      *ngIf="canvasMode; else staticSheetImage"
      class="ph-print-preview-canvas-sheet"
      [side]="side || 'front'"
      [placements]="placementsForSide(side || 'front')"
      [files]="canvasFiles"
      [imageClipPath]="layout.imageClipPath"
      [imageBorderRadiusPx]="layout.imageBorderRadiusPx"
      [trimBleedInteriorClipSpec]="layout.trimBleedInteriorClipSpec"
      [interactive]="canvasInteractive"
      [selectedPlacementInstanceId]="selectedInstanceIdForSide(side || 'front')"
      (placementsChange)="onSheetPlacementsChange(side || 'front', $event)"
      (selectionChange)="onCanvasSelectionChange(side || 'front', $event)">
    </app-ph-canvas-sheet>
    <ng-template #staticSheetImage>
      <div
        class="ph-print-preview-image-bg ph-print-preview-image-bg--static"
        [ngStyle]="sheetBackgroundStyles">
        <img [src]="sheetImageUrl" class="ph-print-preview-image" alt="" />
      </div>
    </ng-template>
  </div>
</ng-template>
