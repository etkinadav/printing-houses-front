<div
  class="ph-print-mockup-host w-100 h-100 d-flex justify-content-center align-items-center"
  [class.ph-print-mockup-host--rtl]="isRTL">
  <div
    *ngIf="mockupLoading"
    class="ph-print-mockup-loading"
    aria-busy="true"
    aria-live="polite">
    <mat-spinner [diameter]="24"></mat-spinner>
  </div>

  <div *ngIf="mockupUrl && printOverlay" class="ph-print-mockup-frame-wrap">
    <div #mockupFrame class="ph-print-mockup-frame">
      <img
        class="ph-print-mockup-bg"
        [src]="mockupUrl"
        alt=""
        draggable="false"
        (load)="onMockupImageLoad()"
        (error)="onMockupImageLoad()" />

      <div
        *ngIf="rectOverlay as rect"
        #printSlot
        class="ph-print-mockup-print"
        [style.left.%]="rect.x * 100"
        [style.top.%]="rect.y * 100"
        [style.width.%]="rect.width * 100"
        [style.height.%]="rect.height * 100">
        <ng-container *ngTemplateOutlet="printAreaGuides; context: { quad: null }"></ng-container>
      </div>

      <div
        *ngIf="quadOverlay as quad"
        #printSlot
        class="ph-print-mockup-print ph-print-mockup-print--quad"
        [style.left.%]="quad.box.x * 100"
        [style.top.%]="quad.box.y * 100"
        [style.width.%]="quad.box.width * 100"
        [style.height.%]="quad.box.height * 100">
        <ng-container *ngTemplateOutlet="printAreaGuides; context: { quad: quad }"></ng-container>
      </div>
    </div>
  </div>
</div>

<ng-template #printAreaGuides let-quad="quad">
  <div
    class="ph-print-mockup-print-area-guides"
    [class.ph-print-mockup-print-area-guides--expanded]="!!cropGuideSvg"
    [style.left.px]="cropGuideSvg?.offsetLeftPx ?? null"
    [style.top.px]="cropGuideSvg?.offsetTopPx ?? null"
    [style.width.px]="cropGuideSvg?.widthPx ?? null"
    [style.height.px]="cropGuideSvg?.heightPx ?? null">
  <div
    *ngIf="showAxisAlignedSheetFillLayer && !showFoldedPrintLayers"
    class="ph-print-mockup-print-image-layer ph-print-mockup-sheet-fill-layer"
    [style.clip-path]="printSlotClipPathCss">
    <div class="ph-print-mockup-sheet-fill" [ngStyle]="sheetFillStyles"></div>
  </div>
  <div
    *ngIf="showPerspectiveSheetFillLayer && !showFoldedPrintLayers && printImageWarp as fillWarp"
    class="ph-print-mockup-print-image-layer ph-print-mockup-print-image-layer--warp ph-print-mockup-sheet-fill-layer"
    [style.clip-path]="printSlotClipPathCss">
    <ng-container *ngTemplateOutlet="bilinearWarp; context: {
      warpWidth: fillWarp.scaledWidthPx,
      warpHeight: fillWarp.scaledHeightPx,
      slices: fillWarp.slices,
      isFill: true
    }"></ng-container>
  </div>
  <ng-container *ngIf="showFoldedPrintLayers && foldingModel as folding">
    <div
      class="ph-print-mockup-folding-panels"
      [style.left.px]="cropGuideSvg?.slotRect.x ?? 0"
      [style.top.px]="cropGuideSvg?.slotRect.y ?? 0"
      [style.width.px]="cropGuideSvg?.slotRect.width ?? folding.slotWidthPx"
      [style.height.px]="cropGuideSvg?.slotRect.height ?? folding.slotHeightPx">
      <ng-container *ngFor="let panel of folding.panels">
        <div
          *ngIf="showSheetFillLayer"
          class="ph-print-mockup-fold-panel-layer ph-print-mockup-print-image-layer ph-print-mockup-print-image-layer--warp ph-print-mockup-sheet-fill-layer"
          [style.clip-path]="panel.clipPath">
          <ng-container *ngTemplateOutlet="bilinearWarp; context: {
            warpWidth: folding.canvasWidthPx,
            warpHeight: folding.canvasHeightPx,
            slices: panel.slices,
            isFill: true
          }"></ng-container>
        </div>
        <div
          *ngIf="showPrintImageLayer"
          class="ph-print-mockup-fold-panel-layer ph-print-mockup-print-image-layer ph-print-mockup-print-image-layer--warp"
          [style.clip-path]="panel.clipPath">
          <ng-container *ngTemplateOutlet="bilinearWarp; context: {
            warpWidth: folding.canvasWidthPx,
            warpHeight: folding.canvasHeightPx,
            slices: panel.slices,
            isFill: false
          }"></ng-container>
        </div>
      </ng-container>
    </div>
  </ng-container>
  <div
    *ngIf="showSingleAxisAlignedPrintImageLayer"
    class="ph-print-mockup-print-image-layer"
    [style.clip-path]="printSlotClipPathCss">
    <img
      class="ph-print-mockup-print-image-stretch"
      [src]="printImageUrl"
      alt=""
      draggable="false" />
  </div>
  <div
    *ngIf="showSinglePerspectivePrintImageLayer && printImageWarp as warp"
    class="ph-print-mockup-print-image-layer ph-print-mockup-print-image-layer--warp"
    [style.clip-path]="printSlotClipPathCss">
    <ng-container *ngTemplateOutlet="bilinearWarp; context: {
      warpWidth: warp.scaledWidthPx,
      warpHeight: warp.scaledHeightPx,
      slices: warp.slices,
      isFill: false
    }"></ng-container>
  </div>
  <svg
    *ngIf="foldingModel as folding"
    class="ph-print-mockup-folding-overlay"
    [attr.viewBox]="foldingOverlayViewBox"
    [ngStyle]="foldingStageStyle"
    preserveAspectRatio="none"
    aria-hidden="true">
    <path
      *ngIf="folding.guide.fillPathD"
      class="ph-print-mockup-folding-guide__fill"
      [attr.d]="folding.guide.fillPathD" />
    <path
      *ngIf="folding.guide.topPathD"
      class="ph-print-mockup-folding-guide__edge"
      [attr.d]="folding.guide.topPathD" />
    <path
      *ngIf="folding.guide.bottomPathD"
      class="ph-print-mockup-folding-guide__edge"
      [attr.d]="folding.guide.bottomPathD" />
    <line
      *ngFor="let pairLine of folding.guide.pairLines"
      class="ph-print-mockup-folding-guide__pair"
      [attr.x1]="pairLine.x1"
      [attr.y1]="pairLine.y1"
      [attr.x2]="pairLine.x2"
      [attr.y2]="pairLine.y2" />
  </svg>
  <svg
    *ngIf="cropGuideSvg as guide; else simplePrintAreaGuide"
    class="ph-print-mockup-print-area-guide"
    [attr.viewBox]="guide.viewBox"
    preserveAspectRatio="none"
    overflow="visible"
    aria-hidden="true">
    <rect
      *ngIf="guide.topRect as topRect"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.x]="topRect.x"
      [attr.y]="topRect.y"
      [attr.width]="topRect.width"
      [attr.height]="topRect.height"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="guide.topPolygonPoints as topPoints"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.points]="topPoints"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <rect
      *ngIf="guide.bottomRect as bottomRect"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.x]="bottomRect.x"
      [attr.y]="bottomRect.y"
      [attr.width]="bottomRect.width"
      [attr.height]="bottomRect.height"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="guide.bottomPolygonPoints as bottomPoints"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.points]="bottomPoints"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <rect
      *ngIf="guide.leftRect as leftRect"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.x]="leftRect.x"
      [attr.y]="leftRect.y"
      [attr.width]="leftRect.width"
      [attr.height]="leftRect.height"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="guide.leftPolygonPoints as leftPoints"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.points]="leftPoints"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <rect
      *ngIf="guide.rightRect as rightRect"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.x]="rightRect.x"
      [attr.y]="rightRect.y"
      [attr.width]="rightRect.width"
      [attr.height]="rightRect.height"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="guide.rightPolygonPoints as rightPoints"
      class="ph-print-mockup-print-area-guide__extension"
      [attr.points]="rightPoints"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <!-- Slot outline: expand 1 SVG unit outward so the stroke is fully outside the image area -->
    <rect
      *ngIf="!quad && !mockupSlotShapedOutlinePathD"
      class="ph-print-mockup-print-area-guide__slot"
      [attr.x]="guide.slotRect.x - 1"
      [attr.y]="guide.slotRect.y - 1"
      [attr.width]="guide.slotRect.width + 2"
      [attr.height]="guide.slotRect.height + 2"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <path
      *ngIf="mockupSlotShapedOutlinePathD"
      class="ph-print-mockup-print-area-guide__slot"
      [attr.d]="mockupSlotShapedOutlinePathD"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="quad && !mockupSlotShapedOutlinePathD && guide.slotPolygonPoints as slotPoints"
      class="ph-print-mockup-print-area-guide__slot"
      [attr.points]="slotPoints"
      fill="none"
      stroke-width="2"
      stroke-dasharray="8 6"
      vector-effect="non-scaling-stroke" />
    <rect
      *ngIf="guide.outerRect as outerRect"
      class="ph-print-mockup-print-area-guide__outer"
      [attr.x]="outerRect.x"
      [attr.y]="outerRect.y"
      [attr.width]="outerRect.width"
      [attr.height]="outerRect.height"
      fill="none"
      stroke-width="1"
      vector-effect="non-scaling-stroke" />
    <polygon
      *ngIf="guide.outerPolygonPoints as outerPoints"
      class="ph-print-mockup-print-area-guide__outer"
      [attr.points]="outerPoints"
      fill="none"
      stroke-width="1"
      vector-effect="non-scaling-stroke" />
  </svg>
  <ng-template #simplePrintAreaGuide>
    <svg
      class="ph-print-mockup-print-area-guide"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      overflow="visible"
      aria-hidden="true">
      <!-- Outset by 1 SVG unit so the stroke is fully outside the slot boundary -->
      <rect
        *ngIf="!quad && !mockupSimpleSlotShapedOutlinePathD"
        class="ph-print-mockup-print-area-guide__slot"
        x="-1"
        y="-1"
        width="102"
        height="102"
        fill="none"
        stroke-width="2"
        stroke-dasharray="8 6"
        vector-effect="non-scaling-stroke" />
      <path
        *ngIf="mockupSimpleSlotShapedOutlinePathD"
        class="ph-print-mockup-print-area-guide__slot"
        [attr.d]="mockupSimpleSlotShapedOutlinePathD"
        fill="none"
        stroke-width="2"
        stroke-dasharray="8 6"
        vector-effect="non-scaling-stroke" />
      <polygon
        *ngIf="quad && !mockupSimpleSlotShapedOutlinePathD"
        class="ph-print-mockup-print-area-guide__slot"
        [attr.points]="quadSlotGuidePoints(quad)"
        fill="none"
        stroke-width="2"
        stroke-dasharray="8 6"
        vector-effect="non-scaling-stroke" />
    </svg>
  </ng-template>
  </div>
</ng-template>

<ng-template
  #bilinearWarp
  let-warpWidth="warpWidth"
  let-warpHeight="warpHeight"
  let-slices="slices"
  let-isFill="isFill">
  <div
    class="ph-print-mockup-bilinear-warp"
    [style.width.px]="warpWidth"
    [style.height.px]="warpHeight">
    <div
      *ngFor="let slice of slices"
      class="ph-print-mockup-bilinear-warp__slice"
      [style.width.px]="warpWidth"
      [style.top.px]="slice.srcTopPx"
      [style.height.px]="slice.srcHeightPx"
      [style.z-index]="slice.zIndex"
      [style.transform]="slice.transform">
      <div
        *ngIf="isFill"
        class="ph-print-mockup-bilinear-warp__slice-content ph-print-mockup-sheet-fill"
        [ngStyle]="sheetFillStyles"
        [style.width.px]="warpWidth"
        [style.height.px]="warpHeight"
        [style.margin-top.px]="-slice.srcTopPx"></div>
      <img
        *ngIf="!isFill"
        class="ph-print-mockup-bilinear-warp__slice-content"
        [src]="printImageUrl"
        alt=""
        draggable="false"
        [style.width.px]="warpWidth"
        [style.height.px]="warpHeight"
        [style.margin-top.px]="-slice.srcTopPx" />
    </div>
  </div>
</ng-template>
