<div class="ph-3d-tunings" [class.ph-3d-tunings--collapsed]="collapsed" *ngIf="preview && ready">
  <header class="ph-3d-tunings__header">
    <button type="button" class="ph-3d-tunings__toggle" (click)="toggleCollapsed()">
      <mat-icon>{{ collapsed ? 'chevron_left' : 'chevron_right' }}</mat-icon>
      <span *ngIf="!collapsed">כיוון תצוגה 3D (זמני)</span>
    </button>
    <div class="ph-3d-tunings__actions" *ngIf="!collapsed">
      <button type="button" mat-stroked-button color="primary" (click)="copySnapshot()">
        העתק נתונים
      </button>
      <button type="button" mat-button (click)="resetToDefaults()">איפוס</button>
    </div>
  </header>

  <div class="ph-3d-tunings__body" *ngIf="!collapsed">
    <mat-accordion multi>
      <mat-expansion-panel *ngFor="let group of groups" [expanded]="group === 'Key light' || group === 'צללים'">
        <mat-expansion-panel-header>
          <mat-panel-title>{{ group }}</mat-panel-title>
        </mat-expansion-panel-header>

        <div class="ph-3d-tunings__field" *ngFor="let field of fieldsForGroup(group)">
          <label class="ph-3d-tunings__label">{{ field.label }}</label>

          <ng-container [ngSwitch]="field.type">
            <input
              *ngSwitchCase="'color'"
              type="color"
              class="ph-3d-tunings__color"
              [value]="fieldValue(field)"
              (input)="onFieldInput(field, $any($event.target).value)" />

            <mat-form-field *ngSwitchCase="'select'" appearance="outline" class="ph-3d-tunings__select">
              <mat-select
                [value]="fieldValue(field)"
                (selectionChange)="onFieldInput(field, $event.value)">
                <mat-option *ngFor="let opt of field.options" [value]="opt.value">
                  {{ opt.label }}
                </mat-option>
              </mat-select>
            </mat-form-field>

            <div *ngSwitchDefault class="ph-3d-tunings__number">
              <mat-slider
                class="ph-3d-tunings__slider"
                [min]="field.min ?? 0"
                [max]="field.max ?? 1"
                [step]="field.step ?? 0.01"
                discrete>
                <input
                  matSliderThumb
                  [value]="fieldValue(field)"
                  (valueChange)="onFieldInput(field, $event)" />
              </mat-slider>
              <input
                type="number"
                class="ph-3d-tunings__input"
                [min]="field.min"
                [max]="field.max"
                [step]="field.step"
                [value]="fieldValue(field)"
                (change)="onFieldInput(field, $any($event.target).value)" />
            </div>
          </ng-container>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</div>
