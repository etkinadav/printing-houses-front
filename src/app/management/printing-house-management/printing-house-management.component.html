<div
  class="printing-house-management-page"
  [class.zx-rtl]="isRTL"
  [class.printing-house-management-page--dark]="isDarkMode">
  <div *ngIf="isLoading" class="ph-mgmt-state">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!isLoading && hasError" class="ph-mgmt-state ph-mgmt-state--error">
    <div>{{ 'management.printing-house.load-failed' | translate }}</div>
    <button mat-stroked-button color="primary" type="button" (click)="load()">
      {{ 'management.printing-house.retry' | translate }}
    </button>
  </div>

  <ng-container *ngIf="!isLoading && !hasError && printingHouse">
    <header class="ph-mgmt-header" [class.ph-mgmt-header--dark]="isDarkMode">
      <div class="ph-mgmt-header__inner">
        <div *ngIf="logoUrl" #logoViewport class="ph-mgmt-header__logo logo-crop-viewport">
          <img
            #logoImg
            class="logo-crop-img"
            [src]="logoUrl"
            alt=""
            (load)="onLogoImgLoad()"
            [style.transform]="logoImgTransform" />
        </div>
        <div *ngIf="!logoUrl" class="ph-mgmt-header__logo ph-mgmt-header__logo--placeholder" aria-hidden="true"></div>

        <div class="ph-mgmt-header__info">
          <h1 class="ph-mgmt-header__name">{{ printingHouse.name }}</h1>
          <p *ngIf="addressLine" class="ph-mgmt-header__address">{{ addressLine }}</p>
        </div>
      </div>

      <div #mapWrap class="ph-mgmt-header__map">
        <div class="map-wrapper">
          <div #mapEl class="printing-house-management-map"></div>
          <div #mapPin class="printing-house-management-map-pin" aria-hidden="true" hidden></div>
        </div>
      </div>
    </header>

    <section class="ph-mgmt-products">
      <h2 class="ph-mgmt-products__title">{{ 'management.printing-house.products' | translate }}</h2>

      <div *ngIf="productsLoading" class="ph-mgmt-products__loading">
        <mat-spinner diameter="32"></mat-spinner>
      </div>

      <p *ngIf="!productsLoading && productsLoadFailed" class="ph-mgmt-products__error">
        {{ 'management.printing-house.products-load-failed' | translate }}
        <button mat-button type="button" (click)="loadProducts()">
          {{ 'management.printing-house.retry' | translate }}
        </button>
      </p>

      <ul *ngIf="!productsLoading && !productsLoadFailed" class="ph-mgmt-products__list">
        <li class="ph-mgmt-products__item ph-mgmt-products__item--add">
          <button
            mat-stroked-button
            type="button"
            class="ph-mgmt-products__add-btn"
            (click)="onAddProduct()">
            {{ 'management.printing-house.add-product' | translate }}
          </button>
        </li>

        <li *ngFor="let product of products" class="ph-mgmt-products__item">
          <div class="ph-mgmt-products__card">
            <span class="ph-mgmt-products__name">{{ product.name_he }}</span>
            <div class="ph-mgmt-products__actions">
              <button mat-button type="button" (click)="onEditProduct(product._id)">
                {{ 'management.printing-house.edit-product' | translate }}
              </button>
              <button mat-button color="warn" type="button" (click)="onDeleteProduct(product)">
                {{ 'management.printing-house.delete-product' | translate }}
              </button>
            </div>
          </div>
        </li>
      </ul>
    </section>
  </ng-container>
</div>
